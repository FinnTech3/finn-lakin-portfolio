# ============================================================
#  Netlify config — Finn Lakin Portfolio
#  Static site — no build step needed.
# ============================================================

[build]
  publish = "."
  ignore = "exit 0"   # never skip deploy

# ── Redirects ────────────────────────────────────────────────
[[redirects]]
  from = "/cv"
  to   = "/assets/finn-lakin-cv.pdf"
  status = 301

[[redirects]]
  from = "/tearsheet"
  to   = "/tearsheet.html"
  status = 301

# 404 fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 404

# ── Security headers ─────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    # Allow jsDelivr CDN (Chart.js + QR code lib) and Google Fonts
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; frame-src 'self' https://finance-analysis-opml.onrender.com; connect-src 'self' https://finance-analysis-opml.onrender.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self';"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
