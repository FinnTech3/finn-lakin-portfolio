# ============================================================
#  Netlify config — Finn Lakin Portfolio
#  Static site — no build step needed.
# ============================================================

[build]
  publish = "."
  ignore = "exit 0"   # never skip deploy

# ── Redirects ────────────────────────────────────────────────
[[redirects]]
  from = "/cv"
  to   = "/assets/finn-lakin-cv.pdf"
  status = 301

# Clean URLs — strip .html extension
[[redirects]]
  from = "/tearsheet"
  to   = "/tearsheet.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to   = "/privacy.html"
  status = 200

[[redirects]]
  from = "/legal"
  to   = "/legal.html"
  status = 200

[[redirects]]
  from = "/colophon"
  to   = "/colophon.html"
  status = 200

# ── Block internal / working files from public access ───────
# These live in the repo for development but must never be served. `force = true`
# makes the rule win even though the files physically exist in the deploy.
[[redirects]]
  from   = "/_dev/*"
  to     = "/404.html"
  status = 404
  force  = true
[[redirects]]
  from   = "/docs/*"
  to     = "/404.html"
  status = 404
  force  = true
[[redirects]]
  from   = "/og-image.html"
  to     = "/404.html"
  status = 404
  force  = true
[[redirects]]
  from   = "/assets/_generate_assets.py"
  to     = "/404.html"
  status = 404
  force  = true
[[redirects]]
  from   = "/assets/_generate_cv_pdf.py"
  to     = "/404.html"
  status = 404
  force  = true

# 404 fallback — branded page (real 404 status)
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

# ── Security headers ─────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    # Allow jsDelivr CDN (Chart.js + QR code lib) and Google Fonts
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; frame-src 'self' https://finance-analysis-opml.onrender.com; connect-src 'self' https://finance-analysis-opml.onrender.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self';"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
