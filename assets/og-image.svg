<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!--
    Finn Lakin — Open Graph social card (1200x630)
    Editorial dark + gold aesthetic matching the portfolio.
    Rendered into a PNG for og:image via any SVG-to-PNG service.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0a0b16"/>
      <stop offset="60%" stop-color="#07070f"/>
      <stop offset="100%" stop-color="#0c0d1a"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#dab86c"/>
      <stop offset="100%" stop-color="#a8893f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#c9a553" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#c9a553" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Soft gold glow centered upper-right -->
  <circle cx="980" cy="220" r="480" fill="url(#glow)"/>

  <!-- Subtle grid overlay (very faint) -->
  <g stroke="#1a1b2a" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="156" x2="1200" y2="156"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="474" x2="1200" y2="474"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Eyebrow line -->
  <g transform="translate(80, 110)">
    <circle cx="6" cy="6" r="3.5" fill="url(#goldGrad)"/>
    <text x="20" y="11" font-family="Georgia, 'Times New Roman', serif"
          font-size="16" letter-spacing="3" fill="#c8c0b0">
      OXFORD BROOKES  ·  ex-DAUPHINE PARIS  ·  CLASS OF 2027
    </text>
  </g>

  <!-- Big name -->
  <g transform="translate(80, 200)">
    <text font-family="Georgia, 'Times New Roman', serif" font-weight="700"
          font-size="170" fill="#e8e0d0" letter-spacing="-3" y="140">
      Finn Lakin
    </text>
  </g>

  <!-- Gold hairline rule -->
  <line x1="80" y1="395" x2="280" y2="395" stroke="url(#goldGrad)" stroke-width="2"/>

  <!-- Subline (target roles) -->
  <text x="80" y="440" font-family="Georgia, 'Times New Roman', serif"
        font-size="30" fill="#c8c0b0" letter-spacing="1">
    <tspan font-style="italic">Equity Research</tspan>
    <tspan>  ·  </tspan>
    <tspan font-style="italic">Quantitative Methods</tspan>
    <tspan>  ·  </tspan>
    <tspan font-style="italic">Financial Technology</tspan>
  </text>

  <!-- Description / value prop -->
  <text x="80" y="495" font-family="Georgia, 'Times New Roman', serif"
        font-size="22" fill="#7880a0" letter-spacing="0.5">
    Trilingual economics &amp; finance student.
  </text>
  <text x="80" y="525" font-family="Georgia, 'Times New Roman', serif"
        font-size="22" fill="#7880a0" letter-spacing="0.5">
    Bloomberg Trading Challenge team leader · +16.4% return · WLS benchmark.
  </text>

  <!-- Bottom band: site URL and brand mark -->
  <line x1="80" y1="575" x2="1120" y2="575" stroke="#1a1b2a" stroke-width="1"/>
  <text x="80" y="603" font-family="Courier, monospace"
        font-size="14" fill="#7880a0" letter-spacing="2.5">
    FINNLAKIN.COM
  </text>
  <text x="1120" y="603" text-anchor="end" font-family="Courier, monospace"
        font-size="14" fill="url(#goldGrad)" letter-spacing="2.5">
    PORTFOLIO · 2026
  </text>

  <!-- Decorative gold corner accents -->
  <path d="M 1100 30 L 1160 30 L 1160 90" stroke="url(#goldGrad)" stroke-width="2" fill="none"/>
  <path d="M 100 600 L 40 600 L 40 540" stroke="url(#goldGrad)" stroke-width="2" fill="none"/>
</svg>
