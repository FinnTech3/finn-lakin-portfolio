<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — Finn Lakin</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    .nf {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem clamp(1.5rem, 5vw, 3rem) 5rem;
      position: relative;
    }
    .nf__glow {
      position: absolute;
      top: 42%; left: 50%;
      transform: translate(-50%, -50%);
      width: min(680px, 90vw); height: 480px;
      background: radial-gradient(ellipse, var(--gold-glow) 0%, transparent 65%);
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }
    .nf > * { position: relative; z-index: 1; }
    .nf__eyebrow {
      display: flex; align-items: center; gap: 0.7rem;
      font-family: var(--font-mono);
      font-size: 0.68rem; font-weight: 500;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 1.6rem;
    }
    .nf__eyebrow::before {
      content: ''; width: 26px; height: 1px; background: var(--gold);
    }
    .nf__code {
      font-family: var(--font-hero);
      font-weight: 600;
      font-size: clamp(5rem, 16vw, 9rem);
      line-height: 0.9;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .nf__code em { font-style: italic; color: var(--gold); }
    .nf__title {
      font-family: var(--font-hero);
      font-style: italic;
      font-size: clamp(1.3rem, 3vw, 1.9rem);
      color: var(--text-2);
      margin: 0.8rem 0 1.1rem;
    }
    .nf__text {
      font-family: var(--font-body);
      font-size: 1rem; line-height: 1.7;
      color: var(--text-2);
      max-width: 440px;
      margin-bottom: 2.4rem;
    }
    .nf__actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .nf__links {
      display: flex; gap: 1.4rem; flex-wrap: wrap; justify-content: center;
      margin-top: 2.6rem;
      font-family: var(--font-mono);
      font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase;
    }
    .nf__links a { color: var(--text-3); transition: color 0.2s; }
    .nf__links a:hover { color: var(--gold); }
  </style>
</head>
<body>
  <div class="nf__glow" aria-hidden="true"></div>
  <main class="nf">
    <div class="nf__eyebrow">Error 404</div>
    <div class="nf__code">4<em>0</em>4</div>
    <h1 class="nf__title">This page slipped the ledger.</h1>
    <p class="nf__text">
      The page you were looking for doesn&rsquo;t exist or has moved. Let&rsquo;s get you back to something that does.
    </p>
    <div class="nf__actions">
      <a href="/" class="btn btn--gold">Back to home</a>
      <a href="/#projects" class="btn btn--ghost">View projects</a>
    </div>
    <nav class="nf__links" aria-label="Quick links">
      <a href="/#about">About</a>
      <a href="/#timeline">Timeline</a>
      <a href="/#contact">Contact</a>
      <a href="/tearsheet">Tearsheet</a>
    </nav>
  </main>
</body>
</html>
